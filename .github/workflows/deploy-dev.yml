name: Deploy to Dev

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  contents: read

env:
  NODE_VERSION: '20'
  AWS_REGION: 'eu-central-1'
  S3_BUCKET: 'dev.workfloow.app'
  CLOUDFRONT_DISTRIBUTION_ID: 'E23KI27ECO43CR'

jobs:
  build-and-deploy:
    name: Build & Deploy to Dev
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build:prod
        env:
          VITE_API_BASE_URL: ${{ secrets.DEV_VITE_API_BASE_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_TOMTOM_API_KEY: ${{ secrets.VITE_TOMTOM_API_KEY }}
          VITE_PADDLE_TOKEN: ${{ secrets.DEV_VITE_PADDLE_TOKEN }}
          VITE_PADDLE_ENV: ${{ secrets.DEV_VITE_PADDLE_ENV }}

      # ── Integration tests (BLOCKING) ──────────────────────────────────────
      # Tests run against the currently deployed dev environment before we
      # overwrite it. A failure here STOPS the deployment.

      - name: Fetch OpenAPI spec from dev API
        run: |
          curl -sSf "${{ secrets.DEV_VITE_API_BASE_URL }}/api-docs" \
            --retry 3 --retry-delay 5 \
            -o openapi-spec.json
          echo "Fetched $(node -e "const s=require('fs').readFileSync('openapi-spec.json','utf8');const j=JSON.parse(s);console.log(Object.keys(j.paths||{}).length)") paths from dev API spec"

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run integration tests (dev — deployment blocked on failure)
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: 'https://dev.workfloow.app'
          API_BASE_URL: ${{ secrets.DEV_VITE_API_BASE_URL }}
          TEST_USER_USERNAME: ${{ secrets.DEV_TEST_USERNAME }}
          TEST_USER_PASSWORD: ${{ secrets.DEV_TEST_PASSWORD }}
          CI: 'true'

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-dev
          path: playwright-report/
          retention-days: 7
      # ─────────────────────────────────────────────────────────────────────

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEV_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: aws s3 sync dist/ s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
